name: Netlify Build and Deploy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run camera control tests
        run: npm run test:controls

      - name: Build production app
        run: npm run build

      - name: Upload Netlify-ready dist
        uses: actions/upload-artifact@v4
        with:
          name: netlify-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

      - name: Read and mask one-time Netlify proxy
        if: hashFiles('.github/netlify-proxy.txt') != ''
        shell: bash
        run: |
          PROXY_URL="$(cat .github/netlify-proxy.txt)"
          echo "::add-mask::$PROXY_URL"
          echo "NETLIFY_PROXY_URL=$PROXY_URL" >> "$GITHUB_ENV"

      - name: Prepare verified static production package
        if: hashFiles('.github/netlify-proxy.txt') != ''
        shell: bash
        run: |
          mkdir -p netlify-upload
          cp -R dist/. netlify-upload/
          cat > netlify-upload/netlify.toml <<'EOF'
          [build]
            command = "echo 'Using verified Motion Rush V3 production bundle'"
            publish = "."

          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200

          [[headers]]
            for = "/sw.js"
            [headers.values]
              Cache-Control = "no-cache"

          [[headers]]
            for = "/manifest.webmanifest"
            [headers.values]
              Content-Type = "application/manifest+json"
          EOF

      - name: Deploy verified static package to Netlify
        if: hashFiles('.github/netlify-proxy.txt') != ''
        shell: bash
        run: |
          cd netlify-upload
          npx -y @netlify/mcp@latest --site-id 54032678-80a3-428b-bfb8-c57176acf850 --proxy-path "$NETLIFY_PROXY_URL" 2>&1 | tee ../netlify-deploy.log

      - name: Upload Netlify deploy log
        if: always() && hashFiles('.github/netlify-proxy.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: netlify-deploy-log
          path: netlify-deploy.log
          if-no-files-found: warn
          retention-days: 1
