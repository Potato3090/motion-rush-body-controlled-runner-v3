name: Netlify Build and Deploy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run camera control tests
        run: npm run test:controls

      - name: Build production app
        run: npm run build

      - name: Upload Netlify-ready dist
        uses: actions/upload-artifact@v4
        with:
          name: netlify-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

      - name: Read and mask one-time Netlify proxy
        if: hashFiles('.github/netlify-proxy.txt') != ''
        shell: bash
        run: |
          PROXY_URL="$(cat .github/netlify-proxy.txt)"
          echo "::add-mask::$PROXY_URL"
          echo "NETLIFY_PROXY_URL=$PROXY_URL" >> "$GITHUB_ENV"

      - name: Deploy production build to Netlify
        if: hashFiles('.github/netlify-proxy.txt') != ''
        run: npx -y @netlify/mcp@latest --site-id 54032678-80a3-428b-bfb8-c57176acf850 --proxy-path "$NETLIFY_PROXY_URL"
