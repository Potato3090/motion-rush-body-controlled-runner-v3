name: Netlify Build Artifact

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run camera control tests
        run: npm run test:controls

      - name: Build production app
        run: npm run build

      - name: Upload Netlify-ready dist
        uses: actions/upload-artifact@v4
        with:
          name: netlify-dist
          path: dist
          if-no-files-found: error
          retention-days: 1
